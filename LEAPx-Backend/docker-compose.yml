services:
  web:
    build: .
    ports:
      - "3000:3000"
    env_file:
      - .env
    networks:
      - event-network

  redis:
    image: redis:7
    container_name: redis-leapx
    environment:
      TZ: Asia/Bangkok
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    networks:
      - event-network

volumes:
  redis-data:

networks:
  event-network:
    driver: bridge